name: Daily Scrape and Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '45 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-scrape-pages
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_now.py

      - name: Commit updated data snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No data.json changes to commit."
          else
            git add data.json
            git commit -m "chore: refresh scraped job data"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'automation/' \
            --exclude 'logs/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.DS_Store' \
            --exclude '*.py' \
            --exclude 'README.md' \
            --exclude 'debug_*.html' \
            --exclude 'fja.html' \
            --exclude 'fja_post.html' \
            --exclude 'se.html' \
            --exclude 'se_post.html' \
            --exclude 'test_post_clean.html' \
            --exclude 'test_dump2.py' \
            --exclude 'test_scraper.py' \
            --exclude '_site/' \
            ./ ./_site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: scrape-and-build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
